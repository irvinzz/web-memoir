appId: org.web-memoir.app
productName: web-memoir
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  - '**/node_modules/crawlee/**/*'
  - '**/node_modules/playwright/**/*'
  - '**/node_modules/@playwright/browser-chromium/**/*'
  - '**/node_modules/@aws-sdk/credential-providers/**/*'
  - '**/node_modules/mongodb/**/*'
  - '**/node_modules/@mongodb-js/saslprep/**/*'
  - '**/node_modules/sparse-bitfield/**/*'
  - '**/node_modules/memory-pager/**/*'
  - '**/node_modules/bson/**/*'
  - '**/node_modules/mongodb-connection-string-url/**/*'
  - '**/node_modules/whatwg-url/**/*'
  - '**/node_modules/webidl-conversions/**/*'
  - '**/node_modules/tr46/**/*'
  - '**/node_modules/punycode/**/*'
  - '**/node_modules/socks-proxy-agent/**/*'
  - '**/node_modules/debug/**/*'
  - '**/node_modules/ms/**/*'
  - '**/node_modules/agent-base/**/*'
  - '**/node_modules/socks/**/*'
  - '**/node_modules/ip-address/**/*'
  - '**/node_modules/smart-buffer/**/*'
  - '**/node_modules/node-forge/**/*'
  - '**/node_modules/agentkeepalive/**/*'
  - '**/node_modules/humanize-ms/**/*'
  - '**/node_modules/get-port/**/*'
win:
  executableName: web-memoir
  target:
    - target: nsis
      arch:
        - x64
  icon: 'resources/icon9.ico'
nsis:
  oneClick: false
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: Web Memoir
  uninstallDisplayName: Web Memoir
  createDesktopShortcut: always
  installerIcon: 'resources/icon9.ico'
  uninstallerIcon: 'resources/icon9.ico'
  installerHeaderIcon: 'resources/icon9.ico'
  allowToChangeInstallationDirectory: true
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  icon: resources/icon9
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    # - snap
    # - deb
  maintainer: electronjs.org
  category: Utility
  icon: resources/icon9
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
